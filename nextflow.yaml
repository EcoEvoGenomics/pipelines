################# Shared ##################
metadata: 
ref_genome: /cluster/projects/nn10082k/ref/house_sparrow_genome_assembly-18-11-14_masked.fa
ref_ploidy: 
ref_gff: /cluster/projects/nn10082k/ref/house_sparrow.gff
ref_n_chroms: 30
ref_scaffold_name: scaffold

########## vd: VCF Diagnostics ############
vd_diag_vcf: 
vd_ld_thin: 0.1
vd_ld_bin_size: 1000
vd_ld_window: 100
vd_ld_window_kb: 1000
vd_snpden_binsize: 100000
vd_n_sampled_sites: 100000

######### ps: Population Structure ########
ps_vcf: 
ps_exclude_chroms: mtDNA
ps_filter_mind: 0.2
ps_filter_geno: 0.2
ps_filter_maf: 0.01
ps_prune_window: 50
ps_prune_step: 10
ps_prune_threshold: 0.1
ps_admixture_kmin: 1
ps_admixture_kmax: 6
ps_aim_variance_threshold: 0.05
ps_fst_populations: 

######### ch: Consensus Haplotree #########
ch_cramdir: 
ch_genome_region: mtDNA
ch_filt_indelgap: 5
ch_filt_inclusions: 'QUAL>20 & FMT/DP>5 & FMT/DP<75'
ch_mafft_iterations: 1000
ch_iqtree_bootstraps: 1000

########## pw: Popgen Windows #############
pw_vcfdir: 
pw_sliding_window: 100000
pw_step_size: 10000
pw_min_sites: 10
pw_input_format: phased
pw_compare_species: true

######### hs: Haplotype Selection #########
hs_vcfdir: 
hs_is_polarised: false
hs_populations: 
hs_ihs_freqbin: 1
hs_cand_pval: 0.05
hs_cand_window: 1E5
hs_cand_overlap: 1E4
hs_cand_min_n_mrk: 3
hs_cand_min_n_extr_mrk: 3
hs_cand_min_perc_extr_mrk: 0
