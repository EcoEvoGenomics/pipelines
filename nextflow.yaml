################# Shared ##################
metadata: 
ref_genome: 
ref_genome_index: 
ref_ploidy: 
ref_scaffold_name: scaffold
ref_gff: 
ref_scaffold_name: 
ref_chr_renames_tsv: 

########## vd: VCF Diagnostics ############
vd_vcf: 
vd_snpden_binsize: 100000
vd_n_sampled_sites: 100000

######### ps: Population Structure ########
ps_vcf: 
ps_exclude_chroms: [ ]
ps_prune_window_kb: 50
ps_prune_step_snps: 10
ps_prune_threshold: 0.1
ps_admixture_kmin: 1
ps_admixture_kmax: 3
ps_aim_variance_threshold: 0.05
ps_fst_populations: [ ]

######### ch: Consensus Haplotree #########
ch_cramdir: 
ch_genome_region: 
ch_filt_indelgap: 5
ch_filt_inclusions: 'QUAL>20 & FMT/DP>5 & FMT/DP<75'
ch_mafft_iterations: 1000
ch_iqtree_bootstraps: 1000

########## pw: Popgen Windows #############
pw_vcfdir: 
pw_sliding_window: 100000
pw_step_size: 10000
pw_min_sites: 10
pw_input_format: phased
pw_compare_species: true

######### hs: Haplotype Selection #########
hs_vcfdir: 
hs_is_polarised: false
hs_populations: [ ]
hs_ihs_freqbin: 1
hs_cand_pval: 0.05
hs_cand_window: 1E5
hs_cand_overlap: 1E4
hs_cand_min_n_mrk: 3
hs_cand_min_n_extr_mrk: 3
hs_cand_min_perc_extr_mrk: 0
hs_plot_main_width_mm: 120
hs_plot_cand_width_mm: 120
hs_plot_height_mm: 30

######## ld: Linkage Disequilibrium #######
ld_vcf: 
ld_thin: 0.5
ld_window: 100
ld_window_kb: 1000
ld_bin_size: 1000
